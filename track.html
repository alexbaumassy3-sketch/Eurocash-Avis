<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Merci — Eurocash Confiseur</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F7F6F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;width:100%;border:1px solid #E5E3DC}
.logo{width:52px;height:52px;background:#1A1A18;border-radius:13px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;margin:0 auto 16px}
.brand{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#7A7870;margin-bottom:10px}
.title{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;line-height:1.2}
.sub{font-size:14px;color:#7A7870;margin-bottom:24px;line-height:1.5}
.stars{font-size:28px;margin-bottom:20px;letter-spacing:3px}
.btn{display:block;width:100%;height:50px;background:#1A1A18;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:10px;text-decoration:none;line-height:50px}
.btn-outline{background:transparent;color:#1A1A18;border:1px solid #E5E3DC;font-size:13px;height:40px;line-height:40px}
.countdown{font-size:12px;color:#B4B2A9;margin-top:12px}
</style>
</head>
<body>
<div class="card" id="main-card">
  <div class="logo">EC</div>
  <div class="brand">Eurocash Confiseur</div>
  <div class="title">Votre avis nous aide à grandir</div>
  <div class="sub">Partagez votre expérience en moins de 2 minutes !</div>
  <div class="stars">★★★★★</div>
  <a class="btn" id="google-btn" href="#" onclick="doRedirect(event)">Laisser un avis Google</a>
  <a class="btn btn-outline" href="#" onclick="doSkip(event)">Pas maintenant</a>
  <div class="countdown">Redirection dans <strong id="timer">10</strong>s</div>
</div>
<script>
const SB_URL='https://jsjpdymrvmjtbmwsgbtp.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzanBkeW1ydm1qdGJtd3NnYnRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTk2OTMsImV4cCI6MjA5MjMzNTY5M30.l4L_Xuknv5TNrYxOCYkDjTBuZUZTdfa_pdpEJ7zNfpM';
const params=new URLSearchParams(window.location.search);
const ref=params.get('ref')||'inconnu';
const name=decodeURIComponent(params.get('name')||ref);
const to=decodeURIComponent(params.get('to')||'https://www.google.com');
document.getElementById('google-btn').href=to;
let t=10;
const iv=setInterval(()=>{t--;document.getElementById('timer').textContent=t;if(t<=0){clearInterval(iv);doRedirect();}},1000);
function doRedirect(e){
  if(e)e.preventDefault();
  clearInterval(iv);
  enregistrerScan();
  setTimeout(()=>{window.location.href=to;},300);
}
function doSkip(e){
  if(e)e.preventDefault();
  clearInterval(iv);
  document.getElementById('main-card').innerHTML=`
    <div style="padding:20px 0">
      <div style="width:52px;height:52px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px">👍</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">Pas de problème !</div>
      <div style="font-size:14px;color:#7A7870">Merci quand même pour votre visite.</div>
    </div>`;
}
async function enregistrerScan(){
  try{
    await fetch(SB_URL+'/rest/v1/scans',{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({commercial_id:ref,commercial_name:name})
    });
  }catch(e){}
}
</script>
</body>
</html>
