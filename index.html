<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eurocash Confiseur — Votre avis compte</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F7F6F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:36px 28px;text-align:center;max-width:360px;width:100%;border:1px solid #E5E3DC}
.logo{width:64px;height:64px;background:#1A1A18;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;margin:0 auto 20px}
.brand{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#7A7870;margin-bottom:10px}
.title{font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:10px;line-height:1.2}
.sub{font-size:15px;color:#7A7870;margin-bottom:24px;line-height:1.5}
.stars{font-size:30px;margin-bottom:22px;letter-spacing:4px;color:#F5B301}
.btn{display:block;width:100%;height:52px;background:#1A1A18;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;line-height:52px}
.footer{font-size:11px;color:#B4B2A9;margin-top:22px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">EC</div>
  <div class="brand">Eurocash Confiseur</div>
  <div class="title">Votre avis compte</div>
  <div class="stars">★ ★ ★ ★ ★</div>
  <div class="sub">Merci de votre visite. Partagez votre expérience en quelques secondes.</div>
  <a class="btn" id="google-btn" href="#" rel="noopener">Déposer un avis Google</a>
  <div class="footer">Merci de votre confiance</div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const ref=params.get('ref')||'unknown';
const placeid=params.get('placeid')||'';
const override=params.get('to')||'';

let reviewUrl;
if(override){
  reviewUrl=override;
}else if(placeid){
  reviewUrl='https://search.google.com/local/writereview?placeid='+encodeURIComponent(placeid);
}else{
  reviewUrl='https://www.google.com/maps/search/Eurocash+Confiseur';
}

const btn=document.getElementById('google-btn');
btn.href=reviewUrl;
btn.addEventListener('click',function(){recordScan(ref);});

function recordScan(refId){
  try{
    const key='scans_'+refId;
    const existing=JSON.parse(localStorage.getItem(key)||'[]');
    existing.push({t:new Date().toISOString(),ua:navigator.userAgent.includes('Mobile')?'Mobile':'Desktop'});
    localStorage.setItem(key,JSON.stringify(existing));
  }catch(e){}
  try{
    fetch('/api/scan',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ref:refId,ts:new Date().toISOString(),mobile:navigator.userAgent.includes('Mobile')})
    }).catch(()=>{});
  }catch(e){}
}
</script>
</body>
</html>
