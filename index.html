<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Merci — Eurocash Confiseur</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F7F6F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:36px 28px;text-align:center;max-width:340px;width:100%;border:1px solid #E5E3DC}
.logo{width:56px;height:56px;background:#1A1A18;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;margin:0 auto 20px}
.brand{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#7A7870;margin-bottom:10px}
.title{font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;line-height:1.2}
.sub{font-size:15px;color:#7A7870;margin-bottom:28px;line-height:1.5}
.stars{font-size:32px;margin-bottom:24px;letter-spacing:4px}
.btn{display:block;width:100%;height:52px;background:#1A1A18;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:10px;text-decoration:none;line-height:52px}
.btn-outline{background:transparent;color:#1A1A18;border:1px solid #E5E3DC;font-size:14px;height:44px;line-height:44px}
.footer{font-size:11px;color:#B4B2A9;margin-top:20px}
.countdown{font-size:13px;color:#7A7870;margin-top:8px}
.success{display:none}
.success .check{width:56px;height:56px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px}
</style>
</head>
<body>
<div class="card" id="main-card">
  <div class="logo">EC</div>
  <div class="brand">Eurocash Confiseur</div>
  <div class="title">Votre avis nous aide à grandir</div>
  <div class="sub">Votre expérience compte beaucoup pour nous. Cela prend moins de 2 minutes !</div>
  <div class="stars">★★★★★</div>
  <a class="btn" id="google-btn" href="#" onclick="doRedirect(event)">Laisser un avis Google</a>
  <a class="btn btn-outline" href="#" onclick="doSkip(event)">Pas maintenant</a>
  <div class="countdown" id="countdown">Redirection automatique dans <strong id="timer">10</strong>s</div>
  <div class="footer">Merci de votre confiance</div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const ref=params.get('ref')||'unknown';
const to=params.get('to')||'https://www.google.com/maps';

document.getElementById('google-btn').href=to;

let t=10;
const iv=setInterval(()=>{
  t--;
  document.getElementById('timer').textContent=t;
  if(t<=0){clearInterval(iv);doRedirect();}
},1000);

function doRedirect(e){
  if(e)e.preventDefault();
  clearInterval(iv);
  recordScan(ref);
  setTimeout(()=>{window.location.href=to;},300);
}

function doSkip(e){
  if(e)e.preventDefault();
  clearInterval(iv);
  recordScan(ref+'_skip');
  document.getElementById('main-card').innerHTML=`
    <div class="success" style="display:block">
      <div class="check">👍</div>
      <div class="title" style="font-size:20px">Pas de problème !</div>
      <div class="sub" style="margin-top:8px">Merci quand même pour votre visite.</div>
    </div>`;
}

function recordScan(refId){
  try{
    const key='scans_'+refId;
    const existing=JSON.parse(localStorage.getItem(key)||'[]');
    existing.push({t:new Date().toISOString(),ua:navigator.userAgent.includes('Mobile')?'Mobile':'Desktop'});
    localStorage.setItem(key,JSON.stringify(existing));
  }catch(e){}
  try{
    fetch('/api/scan',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ref:refId,ts:new Date().toISOString(),mobile:navigator.userAgent.includes('Mobile')})
    }).catch(()=>{});
  }catch(e){}
}
</script>
</body>
</html>
